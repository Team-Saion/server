version: 0.0

os: linux

files:
  - source: app.jar
    destination: /home/ec2-user/runtime

permissions:
  - object: /home/ec2-user/runtime
    owner: ec2-user
    group: ec2-user

hooks:

  ApplicationStop:
    - location: deploy/dev/stop.sh
      timeout: 60
      runas: ec2-user

  ApplicationStart:
    - location: deploy/dev/start.sh
      timeout: 120
      runas: ec2-user

  ValidateService:
    - location: deploy/dev/healthcheck.sh
      timeout: 180
      runas: ec2-user
