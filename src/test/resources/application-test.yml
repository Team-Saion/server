spring:
  config:
    activate:
      on-profile: test

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:unicorn-test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:

  # DB driver memo
  # H2: org.h2.Driver / jdbc:h2:mem:...
  # MySQL: com.mysql.cj.jdbc.Driver / jdbc:mysql://host:3306/db
  # PostgreSQL: org.postgresql.Driver / jdbc:postgresql://host:5432/db
  # MariaDB: org.mariadb.jdbc.Driver / jdbc:mariadb://host:3306/db

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      password:

logging:
  level:
    org.hibernate.SQL: off

app:
  server:
    url: http://localhost
