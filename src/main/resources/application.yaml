spring:
  application:
    name: server
  profiles:
    default: dev
  flyway:
    enabled: false
app:
  server:
    url: ${SERVER_URL:http://localhost:8080}
  notification:
    dispatch:
      enabled: false
      interval-ms: 30000
      batch-size: 100
      max-attempts: 3
      base-retry-delay-minutes: 5
    fcm:
      enabled: false
      project-id: ${FCM_PROJECT_ID:}
      credentials-path: ${FCM_CREDENTIALS_PATH:}
  kakao:
    jwks-uri: ${KAKAO_JWKS_URI:https://kauth.kakao.com/.well-known/jwks.json}
    issuer: ${KAKAO_ISSUER:https://kauth.kakao.com}
  s3:
    region: ${AWS_REGION:ap-northeast-2}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api/api-specs
  use-fqn: false
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    path: /api/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    urls-primary-name: general